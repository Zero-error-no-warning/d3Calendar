<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calend3r basic sample</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="../src/calend3r.css" />
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #calendar { max-width: 1200px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button { padding: 6px 10px; }
  </style>
</head>
<body>
  <h1>Calend3r サンプル</h1>

  <div class="toolbar">
    <button data-view="day">1日表示</button>
    <button data-view="week">週表示</button>
    <button data-view="month">月表示</button>
    <button data-view="year">年表示</button>
    <button id="prev">前へ</button>
    <button id="next">次へ</button>
    <button id="around3">前後3日</button>
    <button id="reset">通常表示</button>
    <button id="toPos">日時→位置</button>
    <button id="toDate">位置→日時</button>
  </div>

  <div id="calendar"></div>

  <script type="module">
    import { createCalend3r } from '../src/calend3r.js';

    let target = new Date('2026-04-10T00:00:00');
    let view = 'week';
    let span = 1;

    const events = [
      { id: '1', title: '朝会', start: '2026-04-10T09:00:00', end: '2026-04-10T09:30:00' },
      { id: '2', title: '1on1', start: '2026-04-10T11:00:00', end: '2026-04-10T11:30:00' },
      { id: '3', title: '開発レビュー', start: '2026-04-11T14:00:00', end: '2026-04-11T15:00:00' },
      { id: '4', title: '月次会議', start: '2026-04-18T13:00:00', end: '2026-04-18T14:30:00' }
    ];

    const cal = createCalend3r('#calendar', {
      targetDate: target,
      view: { type: view, span },
      timelineStepMinutes: 15,
      events
    });

    cal.onRender((instance) => {
      instance.selectAll('event').on('click', (event, datum) => {
        alert(`イベント: ${datum.title}`);
      });

      instance.selectAll('timelineGrid').on('dblclick', (event, day) => {
        const minutes = Number(event.currentTarget.dataset.minutes);
        console.log('timeline dblclick', day, minutes, cal.dateToViewPosition(day));
      });

      instance.selectAll('dateGrid').on('click', (event, datum) => {
        // d3.selectAll('.dateGrid').filter(d => d.date === '2026-04-10') で利用できる datum
        console.log('dateGrid datum', datum);
      });
    });

    document.querySelectorAll('button[data-view]').forEach((btn) => {
      btn.addEventListener('click', () => {
        view = btn.getAttribute('data-view');
        cal.setOptions({ aroundDays: null });
        cal.setView(view, span);
      });
    });

    document.getElementById('prev').addEventListener('click', () => {
      const d = new Date(target);
      if (view === 'day') d.setDate(d.getDate() - 1 * span);
      if (view === 'week') d.setDate(d.getDate() - 7 * span);
      if (view === 'month') d.setMonth(d.getMonth() - 1 * span);
      if (view === 'year') d.setFullYear(d.getFullYear() - 1 * span);
      target = d;
      cal.setTargetDate(target);
    });

    document.getElementById('next').addEventListener('click', () => {
      const d = new Date(target);
      if (view === 'day') d.setDate(d.getDate() + 1 * span);
      if (view === 'week') d.setDate(d.getDate() + 7 * span);
      if (view === 'month') d.setMonth(d.getMonth() + 1 * span);
      if (view === 'year') d.setFullYear(d.getFullYear() + 1 * span);
      target = d;
      cal.setTargetDate(target);
    });

    document.getElementById('around3').addEventListener('click', () => {
      cal.setOptions({ aroundDays: 3 });
    });

    document.getElementById('reset').addEventListener('click', () => {
      cal.setOptions({ aroundDays: null });
      cal.setView(view, span);
    });

    document.getElementById('toPos').addEventListener('click', () => {
      const pos = cal.dateToViewPosition(new Date('2026-04-10T10:30:00'));
      alert(JSON.stringify(pos, null, 2));
    });

    document.getElementById('toDate').addEventListener('click', () => {
      const date = cal.viewPositionToDate({ dayIndex: 0, minuteOfDay: 10 * 60 + 30 });
      alert(date ? date.toISOString() : 'null');
    });
  </script>
</body>
</html>
